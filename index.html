<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0D17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Catan Dice">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Catan Dice Roller</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <header>
      <div id="player-display">Tap to Roll</div>
      <div class="header-btns">
        <button id="pause-btn" class="hidden" aria-label="Pause">&#9646;&#9646;</button>
        <button id="mute-btn" aria-label="Mute">🔊</button>
        <button id="settings-btn" aria-label="Settings">&#9881;</button>
      </div>
    </header>

    <div id="roll-area">
      <div id="dice-container"></div>

      <div id="roll-result">
        <div id="roll-sum">--</div>
        <div id="robber-label" class="hidden">ROBBER!</div>
      </div>

      <div id="tap-hint">Tap to Roll</div>
    </div>

    <div id="timer-bar-container" class="hidden">
      <div id="timer-bar"></div>
    </div>

    <button id="resume-btn" class="hidden">&#9654; Resume Auto-Roll</button>

    <div id="stats-panel">
      <div class="stats-header">
        <h2>This Game</h2>
        <span id="deck-progress"></span>
        <button id="reset-stats-btn">Reset</button>
      </div>
      <div id="stats-chart"></div>
    </div>

    <div id="history-panel">
      <h2>Roll History</h2>
      <ol id="history-list"></ol>
    </div>

  </div>

  <!-- Settings Panel -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="close-settings">&#10005;</button>
      </div>

      <div class="settings-body">
      <div class="setting-row">
        <label for="theme-btn">Theme</label>
        <button id="theme-btn">🌙 Dark</button>
      </div>

      <div class="setting-row">
        <label for="dice-count">Number of Dice</label>
        <select id="dice-count">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="die-sides">Die Type</label>
        <select id="die-sides">
          <option value="4">d4</option>
          <option value="6" selected>d6</option>
          <option value="8">d8</option>
          <option value="10">d10</option>
          <option value="12">d12</option>
          <option value="20">d20</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="player-count">Number of Players</label>
        <select id="player-count">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
        </select>
      </div>

      <div id="player-names-section" class="hidden">
        <div class="setting-section-label">Player Names</div>
        <div id="player-name-inputs"></div>
      </div>

      <div class="setting-row">
        <label for="auto-roll-toggle">Auto-Roll</label>
        <input type="checkbox" id="auto-roll-toggle">
      </div>

      <div class="setting-row" id="interval-row">
        <label for="roll-interval">Seconds Between Rolls</label>
        <input type="number" id="roll-interval" min="5" max="300" value="30">
      </div>

      <div class="setting-row" id="pause-row">
        <label for="pause-on-robber">Pause on Robber</label>
        <input type="checkbox" id="pause-on-robber" checked>
      </div>

      <div class="setting-row" id="announce-name-row">
        <label for="announce-name-toggle">Say Name Every Roll</label>
        <input type="checkbox" id="announce-name-toggle" checked>
      </div>

      <div class="setting-row">
        <label for="voice-select">Voice</label>
        <div class="voice-controls">
          <select id="voice-select"><option value="">Default</option></select>
          <button id="voice-test-btn">Test</button>
        </div>
      </div>

      <div class="setting-row" id="fair-roll-row">
        <label for="fair-roll-toggle">Fair Roll <span class="setting-hint">(2d6 only)</span></label>
        <input type="checkbox" id="fair-roll-toggle">
      </div>

      <button id="install-btn" class="hidden">Install App</button>
      </div><!-- end settings-body -->
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-tab active">
      <span class="nav-icon">🎲</span>
      <span class="nav-label">Dice</span>
    </a>
    <a href="board.html" class="nav-tab">
      <span class="nav-icon">🗺️</span>
      <span class="nav-label">Board</span>
    </a>
  </nav>

  <script src="app.js"></script>
</body>
</html>
