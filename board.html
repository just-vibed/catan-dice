<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0D17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Catan Board</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="board.css">
  <script>
    // Apply theme before render to prevent flash
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
  </script>
</head>
<body>
  <div id="app">

    <header>
      <div id="board-title">Catan Board</div>
      <div class="header-btns">
        <button id="randomize-btn" aria-label="Randomize">🎲 Randomize</button>
        <button id="theme-btn" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <main id="board-main">
      <div id="board-container">
        <svg id="board-svg" viewBox="-410 -375 820 750" xmlns="http://www.w3.org/2000/svg"
             preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <div id="board-legend">
        <div class="legend-item"><span class="legend-swatch" style="background:#E8B84B"></span>Grain ×4</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#5DBB63"></span>Wool ×4</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#2D6A4F"></span>Wood ×4</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#C1440E"></span>Brick ×3</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#7D8FA0"></span>Ore ×3</div>
        <div class="legend-item"><span class="legend-swatch" style="background:#DCC89A"></span>Desert ×1</div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-tab">
        <span class="nav-icon">🎲</span>
        <span class="nav-label">Dice</span>
      </a>
      <a href="board.html" class="nav-tab active">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Board</span>
      </a>
    </nav>

  </div>
  <script src="board.js"></script>
</body>
</html>
